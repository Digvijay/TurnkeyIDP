name: Publish Docker Images to GHCR

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_OPERATOR: ${{ github.repository }}-operator
  IMAGE_UI: ${{ github.repository }}-ui

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: actions/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Operator
        id: meta-operator
        uses: actions/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OPERATOR }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Extract metadata (tags, labels) for UI
        id: meta-ui
        uses: actions/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_UI }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: actions/setup-buildx-action@v3

      - name: Build and push Operator
        uses: actions/build-push-action@v6
        with:
          context: .
          file: src/TurnkeyIdp.Operator/config/Dockerfile
          push: true
          tags: ${{ steps.meta-operator.outputs.tags }}
          labels: ${{ steps.meta-operator.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push UI
        uses: actions/build-push-action@v6
        with:
          context: src/turnkey-idp-ui
          file: src/turnkey-idp-ui/Dockerfile
          push: true
          tags: ${{ steps.meta-ui.outputs.tags }}
          labels: ${{ steps.meta-ui.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
