apiVersion: apiextensions.crossplane.io/v1
kind: Composition
metadata:
  name: compositeidpclusters.gcp.turnkey.idp.io
  labels:
    provider: gcp
spec:
  compositeTypeRef:
    apiVersion: turnkey.idp.io/v1alpha1
    kind: CompositeIdpCluster
  mode: Pipeline
  pipeline:
  - step: patch-and-transform
    functionRef:
      name: function-patch-and-transform
    input:
      apiVersion: pt.fn.crossplane.io/v1beta1
      kind: Resources
      resources:
      - name: gkeCluster
        base:
          apiVersion: container.gcp.upbound.io/v1beta1
          kind: Cluster
          spec:
            forProvider:
              location: us-central1
              initialNodeCount: 1
              removeDefaultNodePool: true
        patches:
        - type: FromCompositeField
          fromFieldPath: "spec.region"
          toFieldPath: "spec.forProvider.location"
        - type: FromCompositeField
          fromFieldPath: "metadata.name"
          toFieldPath: "metadata.name"

      - name: gkeNodePool
        base:
          apiVersion: container.gcp.upbound.io/v1beta1
          kind: NodePool
          spec:
            forProvider:
              location: us-central1
              clusterSelector:
                matchControllerRef: true
              nodeCount: 3
              nodeConfig:
              - machineType: n1-standard-4
              autoscaling:
              - minNodeCount: 3
                maxNodeCount: 10
        patches:
        - type: FromCompositeField
          fromFieldPath: "spec.region"
          toFieldPath: "spec.forProvider.location"
        - type: FromCompositeField
          fromFieldPath: "spec.nodeSize"
          toFieldPath: "spec.forProvider.nodeConfig[0].machineType"
        - type: FromCompositeField
          fromFieldPath: "spec.minNodes"
          toFieldPath: "spec.forProvider.nodeCount"
        - type: FromCompositeField
          fromFieldPath: "spec.minNodes"
          toFieldPath: "spec.forProvider.autoscaling[0].minNodeCount"
        - type: FromCompositeField
          fromFieldPath: "spec.maxNodes"
          toFieldPath: "spec.forProvider.autoscaling[0].maxNodeCount"
        - type: FromCompositeField
          fromFieldPath: "metadata.name"
          toFieldPath: "metadata.name"
          transforms:
          - type: string
            string:
              fmt: "%s-pool"
