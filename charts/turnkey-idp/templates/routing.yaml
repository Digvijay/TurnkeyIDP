apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: idp-gateway
  namespace: istio-system
spec:
  gatewayClassName: {{ .Values.gatewayClass }}
  listeners:
  - name: http
    port: 80
    protocol: HTTP
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: idp-ui-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: idp-gateway
    namespace: istio-system
  hostnames:
  - "idp.{{ .Values.domain }}"
  rules:
  - backendRefs:
    - name: idp-ui
      port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: idp-operator-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
  - name: idp-gateway
    namespace: istio-system
  hostnames:
  - "operator.{{ .Values.domain }}"
  rules:
  - backendRefs:
    - name: idp-operator
      port: 5000
