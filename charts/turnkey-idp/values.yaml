# Default values for turnkey-idp.
# This is a YAML-formatted file.

domain: 127.0.0.1.nip.io
gatewayClass: istio

operator:
  image:
    repository: ghcr.io/digvijay/turnkeyidp-operator
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

ui:
  image:
    repository: ghcr.io/digvijay/turnkeyidp-ui
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
