# Default values for turnkey-idp.
# This is a YAML-formatted file.

domain: 127.0.0.1.nip.io
gatewayClass: istio

# Optional: set to pull from a private GHCR registry
# imagePullSecrets:
#   - name: ghcr-pull-secret

operator:
  image:
    # Must match what publish-docker.yml publishes: ghcr.io/${{ github.repository }}-operator
    repository: ghcr.io/digvijay/turnkeyidp-operator
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi

ui:
  image:
    # Must match what publish-docker.yml publishes: ghcr.io/${{ github.repository }}-ui
    repository: ghcr.io/digvijay/turnkeyidp-ui
    tag: latest
    pullPolicy: Always
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 200m
      memory: 256Mi
